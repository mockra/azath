# azath + tmux integration snippet
# Append to ~/.tmux.conf, then `prefix + r` to reload.

# tmux's run-shell uses a minimal PATH that often excludes ~/bin.
# Use absolute paths so the bindings work everywhere.

# prefix + g -> fzf project switcher
bind-key g display-popup -E -w 60% -h 60% \
  "$HOME/bin/azath list | tail -n +2 | awk '{print \$1}' | /opt/homebrew/bin/fzf --prompt='azath ▸ ' | xargs -r $HOME/bin/azath up"

# prefix + G -> open the dashboard
bind-key G run-shell "$HOME/bin/azath dash"

# prefix + E -> open the editor in the current project's session
bind-key E run-shell "$HOME/bin/azath edit"
